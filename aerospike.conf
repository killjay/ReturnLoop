service {
    cluster-name returnloop
}

logging {
    console {
        context any info
    }
}

network {
    service {
        address any
        port 3000
    }
    heartbeat {
        mode mesh
        address local
        port 3002
        interval 150
        timeout 10
    }
    fabric {
        address local
        port 3001
    }
}

namespace returnloop {
    replication-factor 1
    storage-engine memory {
        data-size 1G
    }
}
